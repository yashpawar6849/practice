name: CI
on: push
env:
  APP_NAME: my-app
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - name: Only on main
       if: github.ref == 'refs/heads/main'
       run: echo "This runs only on main"
     - name: Only on pull requests
       if: github.event_name == 'pull_request'
       run: echo "This runs only on PRs"
